<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NarcFilter – Kompas Rozwodowy</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230f1923'/><path d='M16 4 L26 8 L26 18 C26 23.5 16 28 16 28 C16 28 6 23.5 6 18 L6 8 Z' fill='%2300c9a7'/><text x='16' y='22' text-anchor='middle' font-family='sans-serif' font-weight='bold' font-size='14' fill='white'>N</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
  <style>

/* ── VARIABLES ─────────────────────────────────────────────────────────────── */
:root {
  --header-h: 60px;
  --max-w: 640px;

  --bg:        #0c1821;
  --surface:   rgba(16,36,52,0.85);
  --surface2:  rgba(22,44,64,0.9);
  --border:    rgba(255,255,255,0.07);
  --border-hi: rgba(255,255,255,0.13);

  --teal:      #00c9a7;
  --teal-lt:   #2ed8b5;
  --teal-dim:  rgba(0,201,167,0.12);
  --teal-glow: rgba(0,201,167,0.28);

  --text:      #dff0ec;
  --muted:     #5a8880;
  --subtle:    #294540;

  --tag-bg:    rgba(255,100,70,0.12);
  --tag-color: #ff7b5c;
  --tag-bd:    rgba(255,100,70,0.26);

  --opt-a-bg: rgba(90,140,125,0.09);  --opt-a-bd: #4da893;
  --opt-b-bg: rgba(60,120,200,0.09);  --opt-b-bd: #5b94c4;
  --opt-c-bg: rgba(80,160,100,0.09);  --opt-c-bd: #52a870;

  --err:      #e05c5c;
  --err-bg:   rgba(224,92,92,0.1);
  --err-bd:   rgba(224,92,92,0.25);

  --radius:    16px;
  --radius-sm: 10px;
  --radius-xs: 6px;
  --pill:      100px;

  --shadow:    0 8px 32px rgba(0,0,0,0.5);
  --shadow-sm: 0 2px 10px rgba(0,0,0,0.3);
}

/* ── RESET ──────────────────────────────────────────────────────────────────── */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { font-size:16px; -webkit-text-size-adjust:100%; }
body {
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  background-color: var(--bg);
  color: var(--text);
  line-height: 1.65;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 80% 50% at 8% 0%,   rgba(0,201,167,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 60% 60% at 92% 100%, rgba(0,130,180,0.12) 0%, transparent 55%);
  background-attachment: fixed;
}
button { font-family:inherit; cursor:pointer; border:none; background:none; }
input, textarea { font-family:inherit; font-size:1rem; color:var(--text); }
a { color:var(--teal); }

/* ── APP ─────────────────────────────────────────────────────────────────────── */
#app { min-height:100vh; display:flex; flex-direction:column; position:relative; }

/* ── HEADER ──────────────────────────────────────────────────────────────────── */
.header {
  background: rgba(12,24,33,0.9);
  backdrop-filter: blur(20px) saturate(1.4);
  -webkit-backdrop-filter: blur(20px) saturate(1.4);
  border-bottom: 1px solid var(--border);
  position: sticky; top:0; z-index:100;
}
.header-inner {
  max-width: var(--max-w); margin:0 auto; padding:0 18px;
  height: var(--header-h);
  display:flex; align-items:center; justify-content:space-between;
}

.brand { display:flex; align-items:center; gap:10px; text-decoration:none; }
.brand-icon {
  flex-shrink:0; position:relative;
  filter: drop-shadow(0 0 6px var(--teal-glow));
  animation: shieldGlow 4s ease-in-out infinite;
}
@keyframes shieldGlow {
  0%,100% { filter:drop-shadow(0 0 4px rgba(0,201,167,0.22)); }
  50%      { filter:drop-shadow(0 0 18px rgba(0,201,167,0.55)); }
}
.brand-text { display:flex; flex-direction:column; gap:0; }
.brand-name {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: 1.2rem; font-weight:400; letter-spacing:0.01em;
  background: linear-gradient(120deg, #2ed8b5 0%, #00c9a7 55%, #009e84 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text; line-height:1.2;
}
.brand-tagline {
  font-size: 0.67rem; color: var(--muted); letter-spacing:0.08em;
  font-weight: 500; -webkit-text-fill-color: var(--muted);
}
.module-label {
  font-size: 0.6rem; font-weight: 700;
  color: var(--teal); background: var(--teal-dim);
  border: 1px solid rgba(0,201,167,0.2);
  border-radius: var(--pill); padding: 2px 9px;
  letter-spacing: 0.07em; text-transform: uppercase;
  white-space: nowrap; flex-shrink: 0;
  -webkit-text-fill-color: var(--teal);
}

.header-controls { display:flex; align-items:center; gap:10px; }
.lang-toggle {
  display:flex; align-items:center;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--pill); padding:3px;
}
.lang-btn {
  padding:5px 13px; border-radius:var(--pill);
  font-size:0.77rem; font-weight:600; color:var(--muted);
  letter-spacing:0.04em; transition:all 0.2s;
}
.lang-btn.active {
  background:var(--teal); color:#0c1821;
  box-shadow:0 1px 6px rgba(0,201,167,0.35);
}
.lang-btn:hover:not(.active) { color:var(--teal); }
.btn-settings {
  width:38px; height:38px; border-radius:var(--radius-sm);
  color:var(--muted); font-size:1.1rem;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.2s; border:1px solid transparent;
}
.btn-settings:hover {
  background:var(--surface2); color:var(--teal);
  border-color:var(--border); transform:rotate(30deg);
}

/* ── TAB NAV ─────────────────────────────────────────────────────────────────── */
.tab-nav {
  background:rgba(12,24,33,0.9);
  backdrop-filter:blur(20px) saturate(1.4);
  -webkit-backdrop-filter:blur(20px) saturate(1.4);
  border-bottom:1px solid var(--border);
  position:sticky; top:var(--header-h); z-index:99;
}
.tab-nav-inner {
  max-width:var(--max-w); margin:0 auto;
  display:flex; padding:0 18px; gap:4px;
}
.tab-btn {
  flex:1; padding:13px 16px;
  font-size:0.88rem; font-weight:500; color:var(--muted);
  border-bottom:2px solid transparent; transition:all 0.2s;
  display:flex; align-items:center; justify-content:center; gap:7px;
}
.tab-btn.active { color:var(--teal); border-bottom-color:var(--teal); font-weight:600; }
.tab-btn:hover:not(.active) { color:var(--text); }
.tab-icon { font-size:0.95rem; }

/* ── MAIN ────────────────────────────────────────────────────────────────────── */
.main-content {
  flex:1; max-width:var(--max-w); margin:0 auto; width:100%;
  padding:20px 16px 88px;
}
.panel.hidden { display:none; }

/* ── CARDS ───────────────────────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 22px;
  margin-bottom: 14px;
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
  animation: fadeInUp 0.35s ease-out both;
}
@keyframes fadeInUp {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}
.card::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent 0%, var(--teal-dim) 30%, rgba(0,201,167,0.38) 50%, var(--teal-dim) 70%, transparent 100%);
}

/* ── FORMS ───────────────────────────────────────────────────────────────────── */
.form-label {
  display:block; font-size:0.82rem; font-weight:600;
  color:var(--muted); margin-bottom:9px;
  text-transform:uppercase; letter-spacing:0.07em;
}
.textarea {
  width:100%; padding:13px 15px;
  background: var(--surface2);
  border:1.5px solid var(--border);
  border-radius:var(--radius-sm); font-size:0.95rem;
  resize:vertical; min-height:140px; line-height:1.65;
  transition:border-color 0.2s, box-shadow 0.2s; outline:none;
}
.textarea:focus {
  border-color:var(--teal);
  box-shadow:0 0 0 3px var(--teal-dim), 0 0 18px rgba(0,201,167,0.08);
  background: rgba(22,50,70,0.9);
}
.textarea-sm { min-height:78px; }
.kbd-hint { font-size:0.74rem; color:var(--subtle); text-align:right; margin-top:7px; }

/* ── BUTTONS ─────────────────────────────────────────────────────────────────── */
.btn {
  display:inline-flex; align-items:center; justify-content:center; gap:7px;
  padding:12px 22px; border-radius:var(--radius-sm);
  font-size:0.91rem; font-weight:600; transition:all 0.2s;
  min-height:46px; outline:none; position:relative; overflow:hidden;
}
.btn:focus-visible { box-shadow:0 0 0 3px var(--teal-glow); }

.btn-primary {
  background:linear-gradient(135deg, #2ed8b5, #00b594);
  color:#0c1821; font-weight:700;
  box-shadow:0 2px 12px rgba(0,201,167,0.3);
}
.btn-primary::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.2) 50%,transparent 100%);
  transform:translateX(-100%); transition:transform 0.55s ease;
}
.btn-primary:hover:not(:disabled)::after { transform:translateX(100%); }
.btn-primary:hover:not(:disabled) {
  box-shadow:0 4px 22px rgba(0,201,167,0.45);
  transform:translateY(-1px);
}
.btn-secondary {
  background: var(--surface2); color:var(--text);
  border:1px solid var(--border);
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
}
.btn-secondary:hover:not(:disabled) {
  border-color:var(--teal); color:var(--teal);
  background:rgba(0,201,167,0.06);
}
.btn-outline-danger {
  background:transparent; color:var(--err);
  border:1px solid var(--err-bd);
}
.btn-outline-danger:hover:not(:disabled) { background:var(--err-bg); }

.btn-analyzing {
  background:linear-gradient(90deg,#00a882,#00c9a7,#2ed8b5,#00c9a7,#00a882) !important;
  background-size:200% 100% !important;
  animation:shimmer 1.4s linear infinite !important;
  color:#0c1821 !important;
}
@keyframes shimmer {
  0% { background-position:200% 0; }
  100%{ background-position:-200% 0; }
}

.btn-full { width:100%; margin-top:14px; }
.btn:disabled { opacity:0.42; cursor:not-allowed; transform:none!important; box-shadow:none!important; }
.btn-text {
  background:none; color:var(--teal); font-size:0.84rem;
  font-weight:500; padding:5px 0; min-height:auto;
}
.btn-text:hover { text-decoration:underline; }

/* ── ALERTS ──────────────────────────────────────────────────────────────────── */
.alert { border-radius:var(--radius-sm); padding:15px 18px; font-size:0.91rem; margin-bottom:14px; }
.alert-error { background:var(--err-bg); border:1px solid var(--err-bd); color:var(--err); }

/* ── RESULTS ─────────────────────────────────────────────────────────────────── */
.results-card { animation:cardIn 0.3s ease-out; }
@keyframes cardIn {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}
.reveal { animation:revealIn 0.35s ease-out both; }
@keyframes revealIn {
  from { opacity:0; transform:translateY(7px); }
  to   { opacity:1; transform:translateY(0); }
}
.result-section {
  font-family:'DM Serif Display', Georgia, serif;
  font-size:0.95rem; font-weight:400; font-style:italic;
  color:var(--muted); letter-spacing:0.01em;
  margin:22px 0 10px; padding-bottom:8px;
  border-bottom:1px solid var(--border);
}
.result-section:first-child { margin-top:0; }
.results-card p { font-size:0.94rem; line-height:1.75; margin-bottom:9px; }
.results-card ul { padding-left:22px; margin-bottom:9px; }
.results-card li { font-size:0.94rem; line-height:1.75; margin-bottom:5px; }
.results-card strong { color:var(--text); font-weight:600; }

/* ── OPTION BLOCKS ───────────────────────────────────────────────────────────── */
.option-block {
  border-radius:var(--radius-sm); padding:15px 18px;
  margin:12px 0; border-left:3px solid transparent;
}
.option-block p { font-size:0.92rem!important; margin-bottom:5px!important; }
.option-label {
  font-weight:700; font-size:0.84rem!important;
  margin-bottom:9px!important; letter-spacing:0.01em;
  display:flex; align-items:center; gap:8px;
}
.option-a { background:var(--opt-a-bg); border-left-color:var(--opt-a-bd); }
.option-b { background:var(--opt-b-bg); border-left-color:var(--opt-b-bd); }
.option-c { background:var(--opt-c-bg); border-left-color:var(--opt-c-bd); }
.option-a .option-label { color:var(--opt-a-bd); }
.option-b .option-label { color:var(--opt-b-bd); }
.option-c .option-label { color:var(--opt-c-bd); }
.option-text-edit {
  width:100%; box-sizing:border-box; display:block;
  background:transparent; border:1px solid transparent;
  border-radius:4px; resize:vertical;
  font-size:0.92rem; line-height:1.6;
  color:var(--text); font-family:inherit;
  padding:4px 6px; margin-bottom:6px;
  transition:border-color 0.15s;
}
.option-text-edit:focus {
  outline:none; border-color:rgba(128,128,128,0.35);
  background:rgba(0,0,0,0.04);
}
.option-copy-btn {
  font-size:0.75rem; padding:3px 10px;
  border:1px solid rgba(128,128,128,0.3);
  border-radius:4px; background:transparent;
  color:var(--text-muted); cursor:pointer;
  transition:all 0.15s;
}
.option-copy-btn:hover { background:rgba(128,128,128,0.12); }

/* ── WARM SECTION ────────────────────────────────────────────────────────────── */
.section-warm {
  color:var(--teal) !important;
  border-bottom-color:rgba(0,201,167,0.22) !important;
}
.section-warm ~ p {
  background:rgba(0,201,167,0.05);
  border:1px solid rgba(0,201,167,0.14);
  border-radius:var(--radius-sm);
  padding:15px 18px; font-style:italic;
  line-height:1.85; color:var(--text);
}

/* ── LOG ─────────────────────────────────────────────────────────────────────── */
.log-actions { display:flex; gap:8px; margin-bottom:16px; }
.log-actions .btn { flex:1; font-size:0.84rem; }

.log-entry {
  background: var(--surface);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  border:1px solid var(--border); border-left:3px solid var(--teal);
  border-radius:var(--radius); padding:18px 18px 14px;
  margin-bottom:12px; box-shadow:var(--shadow-sm);
  transition:all 0.2s; animation: fadeInUp 0.3s ease-out both;
}
.log-entry:hover { border-color:var(--border-hi); background: rgba(22,44,64,0.9); }
.entry-header {
  display:flex; align-items:flex-start;
  justify-content:space-between; margin-bottom:11px; gap:8px;
}
.entry-date { font-size:0.77rem; color:var(--muted); font-weight:600; letter-spacing:0.02em; }
.btn-delete {
  color:var(--subtle); font-size:0.8rem; flex-shrink:0;
  padding:3px 7px; border-radius:var(--radius-xs); line-height:1;
  transition:all 0.15s;
}
.btn-delete:hover { background:var(--err-bg); color:var(--err); }
.entry-patterns { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:11px; }
.ptag {
  background:var(--tag-bg); color:var(--tag-color);
  border:1px solid var(--tag-bd);
  border-radius:var(--pill); padding:3px 11px;
  font-size:0.72rem; font-weight:600;
  animation:tagPop 0.2s ease-out both;
}
@keyframes tagPop {
  from { opacity:0; transform:scale(0.85); }
  to   { opacity:1; transform:scale(1); }
}
.ptag-none { background:var(--surface2); color:var(--subtle); border-color:var(--border); }
.entry-msg {
  font-size:0.87rem; color:var(--muted); font-style:italic;
  background:var(--surface2); border-radius:var(--radius-xs);
  padding:10px 14px; border-left:2px solid var(--border);
  margin-bottom:10px; line-height:1.55;
}
.entry-note { font-size:0.84rem; color:var(--muted); margin-bottom:9px; }
.entry-note strong { color:var(--text); }
.btn-toggle { font-size:0.81rem; font-weight:500; color:var(--muted); padding:4px 0; min-height:auto; }
.btn-toggle:hover { color:var(--teal); }
.entry-analysis {
  margin-top:14px; padding-top:14px; border-top:1px solid var(--border);
  animation:cardIn 0.22s ease-out;
}
.entry-analysis .result-section { font-size:0.77rem; margin-top:14px; }
.entry-analysis .option-block { padding:11px 14px; margin:8px 0; }

/* ── EMPTY STATE ─────────────────────────────────────────────────────────────── */
.empty-state { text-align:center; padding:64px 20px; color:var(--muted); }
.empty-icon { font-size:2.8rem; margin-bottom:16px; opacity:0.7; }
.empty-title { font-family:'DM Serif Display',Georgia,serif; font-size:1.15rem; font-weight:400; color:var(--text); margin-bottom:8px; }
.empty-sub { font-size:0.87rem; line-height:1.65; max-width:270px; margin:0 auto; }

/* ── SETTINGS PANEL ──────────────────────────────────────────────────────────── */
.settings-card-header {
  display:flex; align-items:flex-start; justify-content:space-between;
  margin-bottom:22px; gap:12px; flex-wrap:wrap;
}
.settings-card-title {
  font-family:'DM Serif Display',Georgia,serif;
  font-size:1.2rem; font-weight:400; color:var(--text);
}
.security-badge {
  display:inline-flex; align-items:center; gap:5px;
  background:rgba(0,201,167,0.1); border:1px solid rgba(0,201,167,0.2);
  border-radius:var(--pill); padding:4px 12px;
  font-size:0.75rem; font-weight:600; color:var(--teal);
}
.settings-info {
  padding:14px 16px;
  background: rgba(0,201,167,0.05);
  border:1px solid rgba(0,201,167,0.12);
  border-radius:var(--radius-sm);
  font-size:0.84rem; color:var(--muted); line-height:1.7;
  margin-bottom:24px;
}
.settings-divider { height:1px; background:var(--border); margin:24px 0; }
.danger-zone-label {
  font-size:0.75rem; font-weight:600; color:var(--subtle);
  text-transform:uppercase; letter-spacing:0.07em; margin-bottom:12px;
}

/* ── TOAST ───────────────────────────────────────────────────────────────────── */
.toast {
  position:fixed; bottom:28px; left:50%;
  transform:translateX(-50%) translateY(12px);
  background:var(--surface2); color:var(--text);
  border:1px solid var(--border); border-left:3px solid var(--teal);
  padding:11px 22px; border-radius:var(--radius-sm);
  font-size:0.87rem; font-weight:500;
  z-index:400; opacity:0; pointer-events:none;
  transition:opacity 0.22s, transform 0.22s;
  white-space:nowrap; box-shadow:var(--shadow);
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.hidden { display:none; }

/* ── LOADING OVERLAY ─────────────────────────────────────────────────────────── */
.loading-overlay {
  position:fixed; inset:0; z-index:300;
  background:rgba(8,16,26,0.72);
  backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:18px;
  animation:fadeIn 0.2s ease-out;
}
.loading-overlay.hidden { display:none !important; }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
.loading-spinner {
  width:44px; height:44px; border-radius:50%;
  border:3px solid var(--border); border-top-color:var(--teal);
  animation:spin 0.8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text {
  font-family:'DM Serif Display',Georgia,serif;
  font-size:1rem; color:var(--muted); letter-spacing:0.04em;
}

/* ── UTILS ───────────────────────────────────────────────────────────────────── */
.hidden { display:none !important; }

/* ── FOOTER ─────────────────────────────────────────────────────────────────── */
.app-footer {
  text-align:center; padding:16px 16px 32px;
  color:var(--muted); font-size:0.78rem;
}
.footer-link {
  color:var(--muted); text-decoration:none; opacity:0.65;
  transition:opacity 0.15s;
}
.footer-link:hover { opacity:1; text-decoration:underline; }
.footer-sep { margin:0 8px; opacity:0.35; }

/* ── LEGAL MODAL ─────────────────────────────────────────────────────────────── */
.legal-modal {
  position:fixed; inset:0; z-index:900;
  background:rgba(0,0,0,0.72); backdrop-filter:blur(4px);
  display:flex; align-items:center; justify-content:center;
  padding:20px;
}
.legal-modal-box {
  background:var(--surface2); border:1px solid var(--border-hi);
  border-radius:var(--radius); max-width:600px; width:100%;
  max-height:82vh; display:flex; flex-direction:column;
  box-shadow:var(--shadow);
}
.legal-modal-header {
  display:flex; justify-content:flex-end;
  padding:12px 16px 0; flex-shrink:0;
}
.legal-modal-close {
  background:transparent; border:1px solid var(--border-hi);

const Store = {
  get(k, fb = '')  { try { const v = localStorage.getItem(k); return v !== null ? v : fb; } catch { return fb; } },
  set(k, v)        { try { localStorage.setItem(k, String(v)); } catch {} },
  getJ(k, fb = []) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : fb; } catch { return fb; } },
  setJ(k, v)       { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};

// ═══════════════════════════════════════════════════════════════════════════════
// MODULE: I18n
// ═══════════════════════════════════════════════════════════════════════════════
const I18n = {
  t(key) {
    return TRANSLATIONS[S.lang]?.[key] ?? TRANSLATIONS.pl[key] ?? key;
  },
  setLang(lang) {
    S.lang = lang;
    Store.set(SK.lang, lang);
    this.updateAll();
    Render.log();
  },
  updateAll() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
      if (el.classList.contains('tab-btn')) {
        const label = el.querySelectorAll('span')[1];
        if (label) label.textContent = this.t(el.dataset.i18n);
        return;
      }
      const v = this.t(el.dataset.i18n);
      if (v) el.textContent = v;
    });
    document.querySelectorAll('[data-i18n-ph]').forEach(el => {
      const v = this.t(el.dataset.i18nPh);
      if (v) el.placeholder = v;
    });
    document.getElementById('btn-pl').classList.toggle('active', S.lang === 'pl');
    document.getElementById('btn-en').classList.toggle('active', S.lang === 'en');
    document.documentElement.lang = S.lang;
  },
};

// MODULE: Api  — calls the Vercel serverless function (key never in browser)
// ═══════════════════════════════════════════════════════════════════════════════
const Api = {
  async call(message) {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ message, lang: S.lang }),
    });

    if (!res.ok) {
      let msg = `HTTP ${res.status}`;
      try { const e = await res.json(); msg = e?.error || msg; } catch {}
      throw new Error(msg);
    }

    return res.json(); // Already parsed JSON from the server
  },
};

// ═══════════════════════════════════════════════════════════════════════════════
// MODULE: Render
// ═══════════════════════════════════════════════════════════════════════════════
const Render = {

  esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  },

  // Render a JSON analysis response to HTML
  fromJSON(json) {
    let html = '';

    // Patterns
    html += `<h3 class="result-section">${this.esc(I18n.t('lbl_patterns'))}</h3>`;
    if (json.patterns?.length) {
      html += '<ul>' + json.patterns.map(p => `<li>${this.esc(p)}</li>`).join('') + '</ul>';
    } else {
      html += `<p>${this.esc(I18n.t('lbl_no_patterns'))}</p>`;
    }

    // Intent
    html += `<h3 class="result-section">${this.esc(I18n.t('lbl_intent'))}</h3>`;
    if (json.intent) html += `<p>${this.esc(json.intent)}</p>`;

    // Options
    html += `<h3 class="result-section">${this.esc(I18n.t('lbl_options'))}</h3>`;
    for (const [key, cls] of [['optionA','a'], ['optionB','b'], ['optionC','c']]) {
      const opt = json[key];
      if (opt) {
        html += `<div class="option-block option-${cls}">`;
        html += `<p class="option-label">${this.esc(opt.label ?? '')}</p>`;
        if (opt.text) {
          html += `<textarea class="option-text-edit" rows="3">${this.esc(opt.text)}</textarea>`;
          html += `<button class="option-copy-btn" onclick="copyOptionText(this)">${this.esc(I18n.t('btn_copy'))}</button>`;
        }
        html += `</div>`;
      }
    }

    // Warm note
    html += `<h3 class="result-section section-warm">${this.esc(I18n.t('lbl_warmth'))}</h3>`;
    if (json.warmthNote) html += `<p>${this.esc(json.warmthNote)}</p>`;

    return html;
  },

  log() {
    const container = UI.$('log-entries'), empty = UI.$('log-empty');
    const expBtn = UI.$('btn-export'), clrBtn = UI.$('btn-clear');

    if (!S.log.length) {
      empty.classList.remove('hidden'); container.innerHTML = '';
      expBtn.disabled = true; clrBtn.disabled = true; return;
    }

    empty.classList.add('hidden'); expBtn.disabled = false; clrBtn.disabled = false;

    container.innerHTML = S.log.map(e => {
      const preview = e.message.length > 130
        ? this.esc(e.message.slice(0,130)) + '…'
        : this.esc(e.message);

      const tags = e.patterns.length
        ? e.patterns.map(p => `<span class="ptag">${this.esc(p)}</span>`).join('')
        : `<span class="ptag ptag-none">—</span>`;

      const noteHtml = e.note
        ? `<div class="entry-note"><strong>${I18n.t('note_prefix')}</strong> ${this.esc(e.note)}</div>`
        : '';

      // Support both JSON (new) and legacy markdown (old log entries)
      const analysisHtml = typeof e.fullAnalysis === 'object'
        ? this.fromJSON(e.fullAnalysis)
        : this.legacyMarkdown(e.fullAnalysis ?? '');

      return `
        <div class="log-entry">
          <div class="entry-header">
            <span class="entry-date">${this.esc(fmtDate(e.timestamp))}</span>
            <button class="btn-delete" data-action="delete" data-id="${this.esc(e.id)}"
                    title="${I18n.t('btn_delete')}">✕</button>
          </div>
          <div class="entry-patterns">${tags}</div>
          <div class="entry-msg">${preview}</div>
          ${noteHtml}
          <button class="btn-toggle btn-text" data-action="toggle"
                  data-id="${this.esc(e.id)}" data-open="0">${I18n.t('btn_show')}</button>
          <div class="entry-analysis hidden" id="ea-${this.esc(e.id)}">
            ${analysisHtml}
          </div>
        </div>`;
    }).join('');
  },

  // Minimal markdown fallback for any old log entries stored as text
  legacyMarkdown(md) {
    const clean = md.replace(/<script[\s\S]*?<\/script>/gi, '');
    let html = '';
    for (const line of clean.split('\n')) {
      if (/^## /.test(line)) {
        const isWarm = /słowo dla ciebie|a word for you/i.test(line);
        html += `<h3 class="result-section${isWarm ? ' section-warm' : ''}">${this.esc(line.slice(3))}</h3>`;
      } else if (line.trim()) {
        html += `<p>${this.esc(line)}</p>`;
      }
    }
    return html;
  },
};

// ═══════════════════════════════════════════════════════════════════════════════
// MODULE: Analyzer
// ═══════════════════════════════════════════════════════════════════════════════
const Analyzer = {

  async run() {
    const msg = UI.$('msg-input').value.trim();
    if (!msg) { this.showError(I18n.t('err_empty')); return; }

    S.loading = true; S.lastResult = null; S.saved = false;

    const btn = UI.$('btn-analyze');
    btn.disabled = true;
    btn.classList.add('btn-analyzing');
    btn.textContent = I18n.t('btn_analyzing');

    const ol = UI.$('loading-overlay'), lt = UI.$('loading-text');
    if (lt) lt.textContent = I18n.t('btn_analyzing');
    if (ol) ol.classList.remove('hidden');

    UI.$('results-area').classList.add('hidden');
    UI.$('error-area').classList.add('hidden');

    try {
      const json = await Api.call(msg);
      S.lastResult = { json, message: msg, patterns: json.patterns ?? [] };
      this.showResults(json);
    } catch (err) {
      this.showError(this.classifyError(err.message));
    } finally {
      S.loading = false;
      const ol2 = UI.$('loading-overlay');
      if (ol2) ol2.classList.add('hidden');
      btn.disabled = false;
      btn.classList.remove('btn-analyzing');
      btn.textContent = I18n.t('btn_analyze');
    }
  },

  showResults(json) {
    const el = UI.$('results-content');
    el.innerHTML = Render.fromJSON(json);

    el.querySelectorAll('h3, .option-block, p:not(.option-label), li').forEach((node, i) => {
      node.classList.add('reveal');
      node.style.animationDelay = `${i * 0.045}s`;
    });

    UI.$('entry-note').value = '';
    UI.$('results-area').classList.remove('hidden');
    this.resetSaveBtn();
    UI.$('results-area').scrollIntoView({ behavior:'smooth', block:'start' });
  },

  showError(msg) {
    UI.$('error-msg').textContent = msg;
    UI.$('error-area').classList.remove('hidden');
    UI.$('results-area').classList.add('hidden');
    UI.$('error-area').scrollIntoView({ behavior:'smooth', block:'nearest' });
  },

  resetSaveBtn() {
    const b = UI.$('btn-save-log');
    b.disabled = false; b.textContent = I18n.t('btn_save');
  },

  classifyError(msg) {
    if (!navigator.onLine || /fetch|network|failed/i.test(msg)) return I18n.t('err_network');
    if (/429|rate/i.test(msg))                                  return I18n.t('err_rate');
    return I18n.t('err_api');
  },
};

// ═══════════════════════════════════════════════════════════════════════════════
// MODULE: Log
// ═══════════════════════════════════════════════════════════════════════════════
const Log = {

  save() {
    if (!S.lastResult || S.saved) return;
    const note = UI.$('entry-note').value.trim();
    S.log.unshift({
      id: String(Date.now()),
      timestamp: new Date().toISOString(),
      message: S.lastResult.message,
      patterns: S.lastResult.patterns,
      fullAnalysis: S.lastResult.json,   // stored as JSON object
      note,
    });
    Store.setJ(SK.log, S.log);
    S.saved = true;
    const b = UI.$('btn-save-log'); b.disabled = true; b.textContent = I18n.t('btn_saved');
    UI.toast(I18n.t('toast_saved'));
    Render.log();
  },

  delete(id) {
    S.log = S.log.filter(e => e.id !== id);
    Store.setJ(SK.log, S.log);
    Render.log();
    UI.toast(I18n.t('toast_deleted'));
  },

  clear() {
    if (!confirm(I18n.t('confirm_clear'))) return;
    S.log = []; Store.setJ(SK.log, S.log);
    Render.log(); UI.toast(I18n.t('toast_cleared'));
  },

  export() {
    if (!S.log.length) return;

    let out = `NARCFILTER — LOG KOMUNIKACJI\nEksport: ${fmtShort(new Date().toISOString())}\n\n`;
    for (const e of S.log) {
      out += `─────────────────────────────\n`;
      out += `DATA: ${fmtDate(e.timestamp)}\n`;
      out += `WZORZEC: ${e.patterns.join(', ') || '—'}\n`;
      out += `WIADOMOŚĆ:\n"${e.message}"\n`;
      out += `NOTATKA: ${e.note || '—'}\n`;
      out += `─────────────────────────────\n\n`;
    }

    const counts = {};
    for (const e of S.log) for (const p of e.patterns) counts[p] = (counts[p] || 0) + 1;

    out += `PODSUMOWANIE WZORCÓW:\n`;
    const sorted = Object.entries(counts).sort(([,a],[,b]) => b - a);
    if (sorted.length) sorted.forEach(([p,c]) => out += `${p}: ${c}x\n`);
    else out += `—\n`;

    const copy = navigator.clipboard?.writeText(out);
    if (copy) { copy.then(() => UI.toast(I18n.t('toast_copied'))).catch(() => this._fallbackCopy(out)); }
    else this._fallbackCopy(out);
  },

  _fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.cssText = 'position:fixed;opacity:0;pointer-events:none';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); UI.toast(I18n.t('toast_copied'));
  },

  toggle(id, btn) {
    const panel = document.getElementById(`ea-${id}`);
    const isOpen = btn.dataset.open === '1';
    panel.classList.toggle('hidden', isOpen);
    btn.dataset.open = isOpen ? '0' : '1';
    btn.textContent  = isOpen ? I18n.t('btn_show') : I18n.t('btn_hide');
  },
};

// ═══════════════════════════════════════════════════════════════════════════════
// MODULE: Settings
// ═══════════════════════════════════════════════════════════════════════════════
const Settings = {
  open() { UI.setPanel('settings'); },

  clearAll() {
    if (!confirm(I18n.t('confirm_clear'))) return;
    S.log = []; Store.setJ(SK.log, S.log);
    Render.log(); UI.toast(I18n.t('toast_cleared'));
  },
};

// ═══════════════════════════════════════════════════════════════════════════════
// MODULE: UI
// ═══════════════════════════════════════════════════════════════════════════════
const UI = {

  $(id) { return document.getElementById(id); },

  toast(msg, ms = 2600) {
    const el = this.$('toast');
    el.textContent = msg;
    el.classList.remove('hidden'); el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => {
      el.classList.remove('show');
      setTimeout(() => el.classList.add('hidden'), 250);
    }, ms);
  },

  setPanel(name) {
    document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
    document.querySelectorAll('.tab-btn').forEach(b => {
      const active = b.dataset.tab === name;
      b.classList.toggle('active', active);
      b.setAttribute('aria-selected', String(active));
    });
    this.$(`panel-${name}`).classList.remove('hidden');
  },
};

// ═══════════════════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════════════════
function copyOptionText(btn) {
  const text = btn.previousElementSibling.value;
  const p = navigator.clipboard?.writeText(text);
  if (p) p.then(() => UI.toast(I18n.t('toast_copied'))).catch(() => Log._fallbackCopy(text));
  else Log._fallbackCopy(text);
}

function fmtDate(iso) {
  const d = new Date(iso), p = n => String(n).padStart(2,'0');
  return `${p(d.getDate())}.${p(d.getMonth()+1)}.${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
function fmtShort(iso) {
  const d = new Date(iso), p = n => String(n).padStart(2,'0');
  return `${p(d.getDate())}.${p(d.getMonth()+1)}.${d.getFullYear()}`;
}

// ═══════════════════════════════════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════════════════════════════════
function setupEvents() {
  document.querySelectorAll('.tab-btn').forEach(b =>
    b.addEventListener('click', () => UI.setPanel(b.dataset.tab)));

  UI.$('btn-pl').addEventListener('click', () => I18n.setLang('pl'));
  UI.$('btn-en').addEventListener('click', () => I18n.setLang('en'));

  UI.$('btn-settings').addEventListener('click', () => Settings.open());
  UI.$('btn-clear-all').addEventListener('click', () => Settings.clearAll());

  UI.$('btn-analyze').addEventListener('click', () => Analyzer.run());
  UI.$('msg-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) Analyzer.run();
  });

  UI.$('btn-save-log').addEventListener('click', () => Log.save());
  UI.$('btn-export').addEventListener('click', () => Log.export());
  UI.$('btn-clear').addEventListener('click', () => Log.clear());

  UI.$('log-entries').addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const { action, id } = btn.dataset;
    if (action === 'delete') Log.delete(id);
    if (action === 'toggle') Log.toggle(id, btn);
  });

  document.addEventListener('keydown', e => { if (e.key === 'Escape') Legal.close(); });
  UI.$('legal-modal').addEventListener('click', e => { if (e.target === e.currentTarget) Legal.close(); });
}

// ═══════════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════════
function init() {
  S.lang = Store.get(SK.lang, 'pl');
  S.log  = Store.getJ(SK.log, []);

  I18n.updateAll();
  Render.log();
  setupEvents();
}

init();
</script>

</html>
