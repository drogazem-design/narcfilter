<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>

/* ── VARIABLES ─────────────────────────────────────────────────────────────── */
:root {
  --header-h: 60px;
  --max-w: 640px;

  /* Palette — deep ocean */
  --bg:        #0c1821;
  --surface:   rgba(16,36,52,0.85);
  --surface2:  rgba(22,44,64,0.9);
  --border:    rgba(255,255,255,0.07);
  --border-hi: rgba(255,255,255,0.13);

  /* Accent — teal */
  --teal:      #00c9a7;
  --teal-lt:   #2ed8b5;
  --teal-dim:  rgba(0,201,167,0.12);
  --teal-glow: rgba(0,201,167,0.28);

  /* Text */
  --text:      #dff0ec;
  --muted:     #5a8880;
  --subtle:    #294540;

  /* Pattern tags — warm coral */
  --tag-bg:    rgba(255,100,70,0.12);
  --tag-color: #ff7b5c;
  --tag-bd:    rgba(255,100,70,0.26);

  /* Options */
  --opt-a-bg: rgba(90,140,125,0.09);  --opt-a-bd: #4da893;
  --opt-b-bg: rgba(60,120,200,0.09);  --opt-b-bd: #5b94c4;
  --opt-c-bg: rgba(80,160,100,0.09);  --opt-c-bd: #52a870;

  /* Status */
  --err:      #e05c5c;
  --err-bg:   rgba(224,92,92,0.1);
  --err-bd:   rgba(224,92,92,0.25);
  --warn-bg:  rgba(0,201,167,0.07);
  --warn-bd:  rgba(0,201,167,0.18);
  --warn-txt: #00c9a7;

  /* Geometry */
  --radius:    16px;
  --radius-sm: 10px;
  --radius-xs: 6px;
  --pill:      100px;

  /* Shadows */
  --shadow:    0 8px 32px rgba(0,0,0,0.5);
  --shadow-sm: 0 2px 10px rgba(0,0,0,0.3);
}

/* ── RESET ──────────────────────────────────────────────────────────────────── */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { font-size:16px; -webkit-text-size-adjust:100%; }
body {
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  background-color: var(--bg);
  color: var(--text);
  line-height: 1.65;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 80% 50% at 8% 0%,   rgba(0,201,167,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 60% 60% at 92% 100%, rgba(0,130,180,0.12) 0%, transparent 55%);
  background-attachment: fixed;
}
button { font-family:inherit; cursor:pointer; border:none; background:none; }
input, textarea { font-family:inherit; font-size:1rem; color:var(--text); }
a { color:var(--teal); }

/* ── APP ─────────────────────────────────────────────────────────────────────── */
#app { min-height:100vh; display:flex; flex-direction:column; position:relative; }

/* ── HEADER ──────────────────────────────────────────────────────────────────── */
.header {
  background: rgba(12,24,33,0.9);
  backdrop-filter: blur(20px) saturate(1.4);
  -webkit-backdrop-filter: blur(20px) saturate(1.4);
  border-bottom: 1px solid var(--border);
  position: sticky; top:0; z-index:100;
}
.header-inner {
  max-width: var(--max-w); margin:0 auto; padding:0 18px;
  height: var(--header-h);
  display:flex; align-items:center; justify-content:space-between;
}

/* Brand */
.brand { display:flex; align-items:center; gap:10px; text-decoration:none; }
.brand-icon {
  flex-shrink:0; position:relative;
  filter: drop-shadow(0 0 6px var(--teal-glow));
  animation: shieldGlow 4s ease-in-out infinite;
}
@keyframes shieldGlow {
  0%,100% { filter:drop-shadow(0 0 4px rgba(0,201,167,0.22)); }
  50%      { filter:drop-shadow(0 0 18px rgba(0,201,167,0.55)); }
}
.brand-text { display:flex; flex-direction:column; gap:0; }
.brand-name {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: 1.2rem; font-weight:400; letter-spacing:0.01em;
  background: linear-gradient(120deg, #2ed8b5 0%, #00c9a7 55%, #009e84 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text; line-height:1.2;
}
.brand-tagline {
  font-size: 0.67rem; color: var(--muted); letter-spacing:0.08em;
  font-weight: 500; -webkit-text-fill-color: var(--muted);
}
.module-label {
  font-size: 0.6rem; font-weight: 700;
  color: var(--teal); background: var(--teal-dim);
  border: 1px solid rgba(0,201,167,0.2);
  border-radius: var(--pill); padding: 2px 9px;
  letter-spacing: 0.07em; text-transform: uppercase;
  white-space: nowrap; flex-shrink: 0;
  -webkit-text-fill-color: var(--teal);
}

/* Header controls */
.header-controls { display:flex; align-items:center; gap:10px; }
.lang-toggle {
  display:flex; align-items:center;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--pill); padding:3px;
}
.lang-btn {
  padding:5px 13px; border-radius:var(--pill);
  font-size:0.77rem; font-weight:600; color:var(--muted);
  letter-spacing:0.04em; transition:all 0.2s;
}
.lang-btn.active {
  background:var(--teal); color:#0c1821;
  box-shadow:0 1px 6px rgba(0,201,167,0.35);
}
.lang-btn:hover:not(.active) { color:var(--teal); }
.btn-settings {
  width:38px; height:38px; border-radius:var(--radius-sm);
  color:var(--muted); font-size:1.1rem;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.2s; border:1px solid transparent;
}
.btn-settings:hover {
  background:var(--surface2); color:var(--teal);
  border-color:var(--border);
  transform:rotate(30deg);
}

/* ── TAB NAV ─────────────────────────────────────────────────────────────────── */
.tab-nav {
  background:rgba(12,24,33,0.9);
  backdrop-filter:blur(20px) saturate(1.4);
  -webkit-backdrop-filter:blur(20px) saturate(1.4);
  border-bottom:1px solid var(--border);
  position:sticky; top:var(--header-h); z-index:99;
}
.tab-nav-inner {
  max-width:var(--max-w); margin:0 auto;
  display:flex; padding:0 18px; gap:4px;
}
.tab-btn {
  flex:1; padding:13px 16px;
  font-size:0.88rem; font-weight:500; color:var(--muted);
  border-bottom:2px solid transparent; transition:all 0.2s;
  display:flex; align-items:center; justify-content:center; gap:7px;
}
.tab-btn.active { color:var(--teal); border-bottom-color:var(--teal); font-weight:600; }
.tab-btn:hover:not(.active) { color:var(--text); }
.tab-icon { font-size:0.95rem; }

/* ── MAIN ────────────────────────────────────────────────────────────────────── */
.main-content {
  flex:1; max-width:var(--max-w); margin:0 auto; width:100%;
  padding:20px 16px 88px;
}
.panel.hidden { display:none; }

/* ── CARDS ───────────────────────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 22px;
  margin-bottom: 14px;
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
  animation: fadeInUp 0.35s ease-out both;
}
@keyframes fadeInUp {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}
/* Teal shimmer on top edge */
.card::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent 0%, var(--teal-dim) 30%, rgba(0,201,167,0.38) 50%, var(--teal-dim) 70%, transparent 100%);
}

/* ── FORMS ───────────────────────────────────────────────────────────────────── */
.form-label {
  display:block; font-size:0.82rem; font-weight:600;
  color:var(--muted); margin-bottom:9px;
  text-transform:uppercase; letter-spacing:0.07em;
}
.form-hint { font-size:0.79rem; color:var(--subtle); margin-top:8px; line-height:1.55; }
.input {
  width:100%; padding:11px 15px;
  background: var(--surface2);
  border:1.5px solid var(--border);
  border-radius:var(--radius-sm); font-size:0.95rem;
  transition:border-color 0.2s, box-shadow 0.2s; outline:none;
}
.input:focus {
  border-color:var(--teal);
  box-shadow:0 0 0 3px var(--teal-dim), 0 0 14px rgba(0,201,167,0.1);
  background: rgba(22,50,70,0.9);
}
.textarea {
  width:100%; padding:13px 15px;
  background: var(--surface2);
  border:1.5px solid var(--border);
  border-radius:var(--radius-sm); font-size:0.95rem;
  resize:vertical; min-height:140px; line-height:1.65;
  transition:border-color 0.2s, box-shadow 0.2s; outline:none;
}
.textarea:focus {
  border-color:var(--teal);
  box-shadow:0 0 0 3px var(--teal-dim), 0 0 18px rgba(0,201,167,0.08);
  background: rgba(22,50,70,0.9);
}
.textarea-sm { min-height:78px; }
.input-group { display:flex; gap:8px; }
.input-group .input { flex:1; min-width:0; }
.kbd-hint { font-size:0.74rem; color:var(--subtle); text-align:right; margin-top:7px; }

/* ── BUTTONS ─────────────────────────────────────────────────────────────────── */
.btn {
  display:inline-flex; align-items:center; justify-content:center; gap:7px;
  padding:12px 22px; border-radius:var(--radius-sm);
  font-size:0.91rem; font-weight:600; transition:all 0.2s;
  min-height:46px; outline:none; position:relative; overflow:hidden;
}
.btn:focus-visible { box-shadow:0 0 0 3px var(--teal-glow); }

/* Primary — teal */
.btn-primary {
  background:linear-gradient(135deg, #2ed8b5, #00b594);
  color:#0c1821; font-weight:700;
  box-shadow:0 2px 12px rgba(0,201,167,0.3);
}
.btn-primary::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.2) 50%,transparent 100%);
  transform:translateX(-100%); transition:transform 0.55s ease;
}
.btn-primary:hover:not(:disabled)::after { transform:translateX(100%); }
.btn-primary:hover:not(:disabled) {
  box-shadow:0 4px 22px rgba(0,201,167,0.45);
  transform:translateY(-1px);
}

/* Secondary — glass */
.btn-secondary {
  background: var(--surface2);
  color:var(--text);
  border:1px solid var(--border);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}
.btn-secondary:hover:not(:disabled) {
  border-color:var(--teal); color:var(--teal);
  background:rgba(0,201,167,0.06);
}

/* Danger outline */
.btn-outline-danger {
  background:transparent; color:var(--err);
  border:1px solid var(--err-bd);
}
.btn-outline-danger:hover:not(:disabled) { background:var(--err-bg); }

/* Icon variant */
.btn-icon-sm {
  padding:9px 15px;
  background: var(--surface2);
  border:1px solid var(--border); border-radius:var(--radius-sm);
  color:var(--muted); font-size:0.84rem; min-height:44px;
  white-space:nowrap;
}
.btn-icon-sm:hover { border-color:var(--teal); color:var(--teal); }

/* Analyzing shimmer state */
.btn-analyzing {
  background:linear-gradient(90deg,#00a882,#00c9a7,#2ed8b5,#00c9a7,#00a882) !important;
  background-size:200% 100% !important;
  animation:shimmer 1.4s linear infinite !important;
  color:#0c1821 !important;
}
@keyframes shimmer {
  0% { background-position:200% 0; }
  100%{ background-position:-200% 0; }
}

.btn-full { width:100%; margin-top:14px; }
.btn:disabled { opacity:0.42; cursor:not-allowed; transform:none!important; box-shadow:none!important; }
.btn-text {
  background:none; color:var(--teal); font-size:0.84rem;
  font-weight:500; padding:5px 0; min-height:auto;
}
.btn-text:hover { text-decoration:underline; }

/* ── ALERTS ──────────────────────────────────────────────────────────────────── */
.alert { border-radius:var(--radius-sm); padding:15px 18px; font-size:0.91rem; margin-bottom:14px; }
.alert-error { background:var(--err-bg); border:1px solid var(--err-bd); color:var(--err); }
.alert-warning {
  background:var(--warn-bg); border:1px solid var(--warn-bd); color:var(--warn-txt);
  display:flex; flex-direction:column; gap:12px;
}

/* ── RESULTS ─────────────────────────────────────────────────────────────────── */
.results-card { animation:cardIn 0.3s ease-out; }
@keyframes cardIn {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}

/* Staggered reveal */
.reveal { animation:revealIn 0.35s ease-out both; }
@keyframes revealIn {
  from { opacity:0; transform:translateY(7px); }
  to   { opacity:1; transform:translateY(0); }
}

.result-section {
  font-family:'DM Serif Display', Georgia, serif;
  font-size:0.95rem; font-weight:400; font-style:italic;
  color:var(--muted); letter-spacing:0.01em;
  margin:22px 0 10px; padding-bottom:8px;
  border-bottom:1px solid var(--border);
}
.result-section:first-child { margin-top:0; }

.results-card p { font-size:0.94rem; line-height:1.75; margin-bottom:9px; }
.results-card ul { padding-left:22px; margin-bottom:9px; }
.results-card li { font-size:0.94rem; line-height:1.75; margin-bottom:5px; }
.results-card strong { color:var(--text); font-weight:600; }

/* ── OPTION BLOCKS ───────────────────────────────────────────────────────────── */
.option-block {
  border-radius:var(--radius-sm); padding:15px 18px;
  margin:12px 0; border-left:3px solid transparent;
  position:relative;
}
.option-block p { font-size:0.92rem!important; margin-bottom:5px!important; }
.option-label {
  font-weight:700; font-size:0.84rem!important;
  margin-bottom:9px!important; letter-spacing:0.01em;
  display:flex; align-items:center; gap:8px;
}
.option-a { background:var(--opt-a-bg); border-left-color:var(--opt-a-bd); }
.option-b { background:var(--opt-b-bg); border-left-color:var(--opt-b-bd); }
.option-c { background:var(--opt-c-bg); border-left-color:var(--opt-c-bd); }
.option-a .option-label { color:var(--opt-a-bd); }
.option-b .option-label { color:var(--opt-b-bd); }
.option-c .option-label { color:var(--opt-c-bd); }

/* ── WARM SUPPORT SECTION ────────────────────────────────────────────────────── */
.section-warm {
  color:var(--teal) !important;
  border-bottom-color:rgba(0,201,167,0.22) !important;
}
.section-warm ~ p {
  background:rgba(0,201,167,0.05);
  border:1px solid rgba(0,201,167,0.14);
  border-radius:var(--radius-sm);
  padding:15px 18px; font-style:italic;
  line-height:1.85; color:var(--text);
}

/* ── LOG PANEL ───────────────────────────────────────────────────────────────── */
.log-actions { display:flex; gap:8px; margin-bottom:16px; }
.log-actions .btn { flex:1; font-size:0.84rem; }

/* ── LOG ENTRIES ─────────────────────────────────────────────────────────────── */
.log-entry {
  background: var(--surface);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border:1px solid var(--border);
  border-left:3px solid var(--teal);
  border-radius:var(--radius);
  padding:18px 18px 14px;
  margin-bottom:12px;
  box-shadow:var(--shadow-sm);
  transition:all 0.2s;
  animation: fadeInUp 0.3s ease-out both;
}
.log-entry:hover {
  border-color:var(--border-hi);
  border-left-color:var(--teal);
  background: rgba(22,44,64,0.9);
}
.entry-header {
  display:flex; align-items:flex-start;
  justify-content:space-between; margin-bottom:11px; gap:8px;
}
.entry-date {
  font-size:0.77rem; color:var(--muted); font-weight:600;
  letter-spacing:0.02em;
}
.btn-delete {
  color:var(--subtle); font-size:0.8rem; flex-shrink:0;
  padding:3px 7px; border-radius:var(--radius-xs); line-height:1;
  transition:all 0.15s;
}
.btn-delete:hover { background:var(--err-bg); color:var(--err); }
.entry-patterns { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:11px; }
.ptag {
  background:var(--tag-bg); color:var(--tag-color);
  border:1px solid var(--tag-bd);
  border-radius:var(--pill); padding:3px 11px;
  font-size:0.72rem; font-weight:600;
  animation:tagPop 0.2s ease-out both;
}
@keyframes tagPop {
  from { opacity:0; transform:scale(0.85); }
  to   { opacity:1; transform:scale(1); }
}
.ptag-none { background:var(--surface2); color:var(--subtle); border-color:var(--border); }
.entry-msg {
  font-size:0.87rem; color:var(--muted); font-style:italic;
  background:var(--surface2); border-radius:var(--radius-xs);
  padding:10px 14px; border-left:2px solid var(--border);
  margin-bottom:10px; line-height:1.55;
}
.entry-note { font-size:0.84rem; color:var(--muted); margin-bottom:9px; }
.entry-note strong { color:var(--text); }
.btn-toggle { font-size:0.81rem; font-weight:500; color:var(--muted); padding:4px 0; min-height:auto; }
.btn-toggle:hover { color:var(--teal); }
.entry-analysis {
  margin-top:14px; padding-top:14px; border-top:1px solid var(--border);
  animation:cardIn 0.22s ease-out;
}
.entry-analysis .result-section { font-size:0.77rem; margin-top:14px; }
.entry-analysis .option-block { padding:11px 14px; margin:8px 0; }

/* ── EMPTY STATE ─────────────────────────────────────────────────────────────── */
.empty-state { text-align:center; padding:64px 20px; color:var(--muted); }
.empty-icon { font-size:2.8rem; margin-bottom:16px; opacity:0.7; }
.empty-title { font-family:'DM Serif Display',Georgia,serif; font-size:1.15rem; font-weight:400; color:var(--text); margin-bottom:8px; }
.empty-sub { font-size:0.87rem; line-height:1.65; max-width:270px; margin:0 auto; }

/* ── SETTINGS PANEL ──────────────────────────────────────────────────────────── */
.settings-card-header {
  display:flex; align-items:flex-start; justify-content:space-between;
  margin-bottom:22px; gap:12px; flex-wrap:wrap;
}
.settings-card-title {
  font-family:'DM Serif Display',Georgia,serif;
  font-size:1.2rem; font-weight:400; color:var(--text);
}
.security-badge {
  display:inline-flex; align-items:center; gap:5px;
  background:rgba(0,201,167,0.1); border:1px solid rgba(0,201,167,0.2);
  border-radius:var(--pill); padding:4px 12px;
  font-size:0.75rem; font-weight:600; color:var(--teal);
}
.form-group { margin-bottom:20px; }
.settings-note {
  margin-top:16px; padding:13px 15px;
  background: rgba(22,44,64,0.6);
  border-radius:var(--radius-xs);
  border:1px solid var(--border);
  font-size:0.79rem; color:var(--muted); line-height:1.6;
}
.settings-divider {
  height:1px; background:var(--border); margin:24px 0;
}
.danger-zone-label {
  font-size:0.75rem; font-weight:600; color:var(--subtle);
  text-transform:uppercase; letter-spacing:0.07em; margin-bottom:12px;
}

/* ── TOAST ───────────────────────────────────────────────────────────────────── */
.toast {
  position:fixed; bottom:28px; left:50%;
  transform:translateX(-50%) translateY(12px);
  background:var(--surface2); color:var(--text);
  border:1px solid var(--border); border-left:3px solid var(--teal);
  padding:11px 22px; border-radius:var(--radius-sm);
  font-size:0.87rem; font-weight:500;
  z-index:400; opacity:0; pointer-events:none;
  transition:opacity 0.22s, transform 0.22s;
  white-space:nowrap; box-shadow:var(--shadow);
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.hidden { display:none; }

/* ── LOADING OVERLAY ─────────────────────────────────────────────────────────── */
.loading-overlay {
  position:fixed; inset:0; z-index:300;
  background:rgba(8,16,26,0.72);
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:18px;
  animation:fadeIn 0.2s ease-out;
}
.loading-overlay.hidden { display:none !important; }
@keyframes fadeIn {
  from { opacity:0; }
  to   { opacity:1; }
}
.loading-spinner {
  width:44px; height:44px; border-radius:50%;
  border:3px solid var(--border);
  border-top-color:var(--teal);
  animation:spin 0.8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text {
  font-family:'DM Serif Display',Georgia,serif;
  font-size:1rem; color:var(--muted); letter-spacing:0.04em;
}

/* ── UTILS ───────────────────────────────────────────────────────────────────── */

const PROMPT_PL = `Jesteś asystentem analizy komunikacji dla osób, które utrzymują kontakt z osobami wykazującymi narcystyczne wzorce komunikacyjne. Twoja rola jest ściśle ograniczona do analizowania wzorców komunikacji i sugerowania strategii odpowiedzi. Nie jesteś terapeutą, psychologiem ani doradcą prawnym.

FRAMEWORK ANALIZY

Gdy użytkownik wklei wiadomość, przeanalizuj ją pod kątem następujących wzorców manipulacji. Zidentyfikuj, które są obecne i nazwij je prostym językiem:

1. WZBUDZANIE POCZUCIA WINY — zmuszanie odbiorcy do tłumaczenia się lub udowadniania swojej wartości. Cel: uległość.
2. ZNIEKSZTAŁCANIE RZECZYWISTOŚCI (Gaslighting) — zaprzeczanie faktom, przepisywanie historii, sprawianie, że odbiorca wątpi we własną percepcję.
3. BEZPOŚREDNIA DEWALUACJA — jawne ataki na inteligencję, kompetencje, uczciwość lub charakter.
4. INSTRUMENTALNE CIEPŁO — życzliwość pojawiająca się wyłącznie, gdy nadawca czegoś potrzebuje.
5. ODWRÓCENIE RÓL OFIARY — nadawca przedstawia siebie jako skrzywdzonego. Jego zachowanie jest reinterpretowane jako Twoja wina.
6. WORD SALAD — chaotyczna, kołowa wiadomość zaprojektowana tak, aby zdezorientować i wyczerpać.
7. TRIANGULACJA — wprowadzanie osób trzecich w celu wywołania niepewności lub presji.
8. HACZYK (Bait) — wiadomość zaprojektowana tak, aby wywołać reakcję emocjonalną dotykającą dzieci, lęków lub dawnych ran.
9. PROJEKCJA — oskarżanie odbiorcy o zachowania, które należą do nadawcy.

STRATEGIA ODPOWIEDZI

Podaj TRZY opcje wyraźnie oznaczone:

OPCJA A — GRAY ROCK: Krótka, rzeczowa, emocjonalnie neutralna. Bez JADE (Uzasadniaj, Kłóć się, Broń się, Tłumacz). Maks. 2-3 zdania.
OPCJA B — TYLKO FAKTY: Odnosi się wyłącznie do treści praktycznych, całkowicie ignoruje warstwę manipulacji.
OPCJA C — BRAK ODPOWIEDZI: Użyj, gdy wiadomość nie ma treści wymagającej działania lub odpowiedź mogłaby eskalować. Wyjaśnij krótko, dlaczego milczenie jest właściwe.

ZASADY TONU
- Ciepły, spokojny, wspierający wobec użytkownika
- Nigdy kliniczny ani zimny
- Nigdy nie mów użytkownikowi, co ma robić z relacją
- Nigdy nie diagnozuj nadawcy — mów "ta wiadomość zawiera wzorce...", nie "ta osoba jest..."
- Jeśli użytkownik wydaje się w trudnym stanie, delikatnie zaznacz, że profesjonalne wsparcie może być pomocne

TWARDE LIMITY
NIGDY: nie diagnozuj nikogo, nie dawaj porad prawnych, nie mów użytkownikowi, czy ma zostać czy odejść
ZAWSZE: opieraj analizę wyłącznie na dostarczonym tekście, przypominaj użytkownikowi, że najlepiej zna swoją sytuację

FORMAT WYJŚCIA:

## Analiza wzorców
[wykryte wzorce, jeden w linii]

## Co ta wiadomość próbuje osiągnąć
[jeden krótki akapit]

**Opcja A — Gray Rock**
[tekst odpowiedzi]

[tekst odpowiedzi lub "Nie dotyczy"]

**Opcja C — Brak odpowiedzi**
[jeśli zalecane: krótkie wyjaśnienie dlaczego]

## Słowo dla ciebie
[2-3 zdania ciepłego, uziemiającego wsparcia. Nie porady. Tylko uznanie.]`;

const PROMPT_EN = `You are a communication analysis assistant for people who are in contact with individuals who display narcissistic communication patterns. Your role is strictly limited to analyzing communication patterns and suggesting response strategies. You are not a therapist, psychologist, or legal advisor.

ANALYSIS FRAMEWORK

When the user pastes a message, analyze it for the following manipulation patterns. Identify which are present and briefly name them in plain language:

1. GUILT INDUCTION — pushing the recipient to explain themselves or prove their worth. Goal: submission.
2. REALITY DISTORTION (Gaslighting) — denying facts, rewriting history, making recipient doubt their own perception.
3. DIRECT DEVALUATION — explicit attacks on intelligence, competence, honesty, or character.
4. TRANSACTIONAL WARMTH — kindness that appears only when the sender needs something.
5. VICTIM REVERSAL — sender positions themselves as wronged party. Their behavior reframed as your fault.
6. WORD SALAD — chaotic, circular message designed to confuse and exhaust.
7. TRIANGULATION — introducing third parties to create insecurity or pressure.
8. BAIT — message designed to trigger emotional reaction touching on children, fears, or past wounds.
9. PROJECTION — accusing recipient of behaviors that belong to the sender.

RESPONSE STRATEGY

Provide THREE options labeled clearly:

OPTION A — GRAY ROCK: Short, factual, emotionally neutral. No JADE (Justify, Argue, Defend, Explain). Max 2-3 sentences.
OPTION B — FACTS ONLY: Acknowledges only practical content, ignores manipulation layer completely.
OPTION C — NO RESPONSE: Use when message has no actionable content or responding would escalate. Explain briefly why silence is appropriate.

TONE RULES
- Warm, calm, supportive toward the user
- Never clinical or cold
- Never tell user what to do about the relationship
- Never diagnose the sender — say "this message contains patterns of..." not "this person is..."
- If user seems distressed, gently note professional support can be helpful

HARD LIMITS
NEVER: diagnose anyone, give legal advice, tell user to stay or leave the relationship
ALWAYS: base analysis only on provided text, remind user they know their situation best

OUTPUT FORMAT:

## Pattern Analysis
[detected patterns, one per line]

## What this message is trying to achieve
[one short paragraph]

## Your response options

**Option A — Gray Rock**
[response text]

**Option B — Facts Only**
[response text or "N/A"]

**Option C — No Response**
[if recommended: brief explanation why]

## A word for you
[2-3 sentences of warm, grounding support. Not advice. Just acknowledgment.]`;

const Store = {
  get(k, fb = '')  { try { const v = localStorage.getItem(k); return v !== null ? v : fb; } catch { return fb; } },
  set(k, v)        { try { localStorage.setItem(k, String(v)); } catch {} },
  getJ(k, fb = []) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : fb; } catch { return fb; } },
  setJ(k, v)       { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};

// ═══════════════════════════════════════════════════════════════════════════════
// MODULE: I18n  — translations & language switching
// ═══════════════════════════════════════════════════════════════════════════════
const I18n = {
  t(key) {
    return TRANSLATIONS[S.lang]?.[key] ?? TRANSLATIONS.pl[key] ?? key;
  },
  setLang(lang) {
    S.lang = lang;
    Store.set(SK.lang, lang);
    this.updateAll();
    Render.log();
  },
  updateAll() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
      if (el.classList.contains('tab-btn')) {
        const label = el.querySelectorAll('span')[1];
        if (label) label.textContent = this.t(el.dataset.i18n);
        return;
      }
      const v = this.t(el.dataset.i18n);
      if (v) el.textContent = v;
    });
    document.querySelectorAll('[data-i18n-ph]').forEach(el => {
      const v = this.t(el.dataset.i18nPh);
      if (v) el.placeholder = v;
    });
    document.getElementById('btn-pl').classList.toggle('active', S.lang === 'pl');
    document.getElementById('btn-en').classList.toggle('active', S.lang === 'en');
    document.documentElement.lang = S.lang;

};

// MODULE: Api  — Anthropic API call
// ═══════════════════════════════════════════════════════════════════════════════
const Api = {
  async call(message) {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'x-api-key': S.apiKey,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model:      MODEL,
        max_tokens: 1500,
        system:     S.lang === 'pl' ? PROMPT_PL : PROMPT_EN,
        messages:   [{ role: 'user', content: message }],
      }),
    });

    if (!res.ok) {
      let msg = `HTTP ${res.status}`;
      try { const e = await res.json(); msg = e?.error?.message || msg; } catch {}
      throw new Error(msg);
    }

    const data = await res.json();
    return data.content[0].text;
  },
};

// ═══════════════════════════════════════════════════════════════════════════════
// MODULE: Render  — markdown → HTML, log entries
// ═══════════════════════════════════════════════════════════════════════════════
const Render = {

  esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  },

  inline(s) {
    return s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
            .replace(/\*(.+?)\*/g,'<em>$1</em>');
  },

  extractPatterns(md) {
    const pts = []; const lines = md.split('\n'); let active = false;
    for (const line of lines) {
      if (/^## (Analiza wzorców|Pattern Analysis)/i.test(line)) { active = true; continue; }
      if (active && /^## /.test(line)) break;
      if (active && line.trim()) {
        const p = line.replace(/^[-•*\d.]\s+/,'').replace(/\*\*/g,'')
                      .split('—')[0].split(':')[0].trim();
        if (p) pts.push(p);
      }
    }
    return pts;
  },

  markdown(md) {
    const clean = md.replace(/<script[\s\S]*?<\/script>/gi, '');
    const lines = clean.split('\n');
    let html = '', inOpt = false, inList = false, para = '';

    const flushPara = () => {
      if (para.trim()) { html += `<p>${this.inline(this.esc(para.trim()))}</p>`; para = ''; }
    };

    for (const line of lines) {
      if (/^## /.test(line)) {
        flushPara();
        if (inList)  { html += '</ul>'; inList = false; }
        if (inOpt)   { html += '</div>'; inOpt = false; }
        const isWarm = /słowo dla ciebie|a word for you/i.test(line);
        html += `<h3 class="result-section${isWarm ? ' section-warm' : ''}">${this.esc(line.slice(3))}</h3>`;
      } else if (/^\*\*(Opcja|Option)\s+([ABC])/i.test(line)) {
        flushPara();
        if (inList) { html += '</ul>'; inList = false; }
        if (inOpt)  { html += '</div>'; inOpt = false; }
        const m = line.match(/^\*\*(Opcja|Option)\s+([ABC])/i);
        const l = m[2].toLowerCase();
        const title = line.replace(/^\*\*/,'').replace(/\*\*$/,'');
        html += `<div class="option-block option-${l}"><p class="option-label">${this.inline(this.esc(title))}</p>`;
        inOpt = true;
      } else if (line.trim() === '') {
        flushPara();
        if (inList) { html += '</ul>'; inList = false; }
      } else if (/^[-•]\s/.test(line)) {
        flushPara();
        if (!inList) { html += '<ul>'; inList = true; }
        html += `<li>${this.inline(this.esc(line.replace(/^[-•]\s/,'')))}</li>`;
      } else {
        if (inList) { html += '</ul>'; inList = false; }
        if (para) para += ' ';
        para += line;
      }
    }

    flushPara();
    if (inList) html += '</ul>';
    if (inOpt)  html += '</div>';
    return html;
  },

  log() {
    const container = UI.$('log-entries'), empty = UI.$('log-empty');
    const expBtn = UI.$('btn-export'), clrBtn = UI.$('btn-clear');

    if (!S.log.length) {
      empty.classList.remove('hidden'); container.innerHTML = '';
      expBtn.disabled = true; clrBtn.disabled = true; return;
    }

    empty.classList.add('hidden'); expBtn.disabled = false; clrBtn.disabled = false;

    container.innerHTML = S.log.map(e => {
      const preview = e.message.length > 130
        ? this.esc(e.message.slice(0,130)) + '…'
        : this.esc(e.message);

      const tags = e.patterns.length
        ? e.patterns.map(p => `<span class="ptag">${this.esc(p)}</span>`).join('')
        : `<span class="ptag ptag-none">—</span>`;

      const noteHtml = e.note
        ? `<div class="entry-note"><strong>${I18n.t('note_prefix')}</strong> ${this.esc(e.note)}</div>`
        : '';

      return `
        <div class="log-entry">
          <div class="entry-header">
            <span class="entry-date">${this.esc(fmtDate(e.timestamp))}</span>
            <button class="btn-delete" data-action="delete" data-id="${this.esc(e.id)}"
                    title="${I18n.t('btn_delete')}">✕</button>
          </div>
          <div class="entry-patterns">${tags}</div>
          <div class="entry-msg">${preview}</div>
          ${noteHtml}
          <button class="btn-toggle btn-text" data-action="toggle"
                  data-id="${this.esc(e.id)}" data-open="0">${I18n.t('btn_show')}</button>
          <div class="entry-analysis hidden" id="ea-${this.esc(e.id)}">
            ${this.markdown(e.fullAnalysis)}
          </div>
        </div>`;
    }).join('');
  },
};

// ═══════════════════════════════════════════════════════════════════════════════
// MODULE: Analyzer  — run analysis, manage panel states
// ═══════════════════════════════════════════════════════════════════════════════
const Analyzer = {

  async run() {
    const msg = UI.$('msg-input').value.trim();
    if (!msg)      { this.showError(I18n.t('err_empty'));  return; }
    if (!S.apiKey) { this.showError(I18n.t('err_no_key')); return; }

    S.loading = true; S.lastResult = null; S.saved = false;

    const btn = UI.$('btn-analyze');
    btn.disabled = true;
    btn.classList.add('btn-analyzing');
    btn.textContent = I18n.t('btn_analyzing');

    const ol = UI.$('loading-overlay'), lt = UI.$('loading-text');
    if (lt) lt.textContent = I18n.t('btn_analyzing');
    if (ol) ol.classList.remove('hidden');

    UI.$('results-area').classList.add('hidden');
    UI.$('error-area').classList.add('hidden');

    try {
      const markdown = await Api.call(msg);
      S.lastResult = { markdown, message: msg, patterns: Render.extractPatterns(markdown) };
      this.showResults(markdown);
    } catch (err) {
      this.showError(this.classifyError(err.message));
    } finally {
      S.loading = false;
      const ol2 = UI.$('loading-overlay');
      if (ol2) ol2.classList.add('hidden');
      btn.disabled = false;
      btn.classList.remove('btn-analyzing');
      btn.textContent = I18n.t('btn_analyze');
    }
  },

  showResults(markdown) {
    const el = UI.$('results-content');
    el.innerHTML = Render.markdown(markdown);

    el.querySelectorAll('h3, .option-block, p:not(.option-label), li').forEach((node, i) => {
      node.classList.add('reveal');
      node.style.animationDelay = `${i * 0.045}s`;
    });

    UI.$('entry-note').value = '';
    UI.$('results-area').classList.remove('hidden');
    this.resetSaveBtn();
    UI.$('results-area').scrollIntoView({ behavior:'smooth', block:'start' });
  },

  showError(msg) {
    UI.$('error-msg').textContent = msg;
    UI.$('error-area').classList.remove('hidden');
    UI.$('results-area').classList.add('hidden');
    UI.$('error-area').scrollIntoView({ behavior:'smooth', block:'nearest' });
  },

  resetSaveBtn() {
    const b = UI.$('btn-save-log');
    b.disabled = false; b.textContent = I18n.t('btn_save');
  },

  classifyError(msg) {
    if (/401|authentication|invalid/i.test(msg))               return I18n.t('err_invalid_key');
    if (!navigator.onLine || /fetch|network|failed/i.test(msg)) return I18n.t('err_network');
    if (/429|rate/i.test(msg))                                  return I18n.t('err_rate');
    if (/5\d{2}/.test(msg))                                     return I18n.t('err_api');
    return msg;
  },
};

// ═══════════════════════════════════════════════════════════════════════════════
// MODULE: Log  — save, delete, clear, export, toggle entry
// ═══════════════════════════════════════════════════════════════════════════════
const Log = {

  save() {
    if (!S.lastResult || S.saved) return;
    const note = UI.$('entry-note').value.trim();
    S.log.unshift({
      id: String(Date.now()),
      timestamp: new Date().toISOString(),
      message: S.lastResult.message,
      patterns: S.lastResult.patterns,
      fullAnalysis: S.lastResult.markdown,
      note,
    });
    Store.setJ(SK.log, S.log);
    S.saved = true;
    const b = UI.$('btn-save-log'); b.disabled = true; b.textContent = I18n.t('btn_saved');
    UI.toast(I18n.t('toast_saved'));
    Render.log();
  },

  delete(id) {
    S.log = S.log.filter(e => e.id !== id);
    Store.setJ(SK.log, S.log);
    Render.log();
    UI.toast(I18n.t('toast_deleted'));
  },

  clear() {
    if (!confirm(I18n.t('confirm_clear'))) return;
    S.log = []; Store.setJ(SK.log, S.log);
    Render.log(); UI.toast(I18n.t('toast_cleared'));
  },

  export() {
    if (!S.log.length) return;

    let out = `NARCFILTER — LOG KOMUNIKACJI\nEksport: ${fmtShort(new Date().toISOString())}\n\n`;
    for (const e of S.log) {
      out += `─────────────────────────────\n`;
      out += `DATA: ${fmtDate(e.timestamp)}\n`;
      out += `WZORZEC: ${e.patterns.join(', ') || '—'}\n`;
      out += `WIADOMOŚĆ:\n"${e.message}"\n`;
      out += `NOTATKA: ${e.note || '—'}\n`;
      out += `─────────────────────────────\n\n`;
    }

    const counts = {};
    for (const e of S.log) for (const p of e.patterns) counts[p] = (counts[p] || 0) + 1;

    out += `PODSUMOWANIE WZORCÓW:\n`;
    const sorted = Object.entries(counts).sort(([,a],[,b]) => b - a);
    if (sorted.length) sorted.forEach(([p,c]) => out += `${p}: ${c}x\n`);
    else out += `—\n`;

    const copy = navigator.clipboard?.writeText(out);
    if (copy) { copy.then(() => UI.toast(I18n.t('toast_copied'))).catch(() => this._fallbackCopy(out)); }
    else this._fallbackCopy(out);
  },

  _fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.cssText = 'position:fixed;opacity:0;pointer-events:none';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); UI.toast(I18n.t('toast_copied'));
  },

  toggle(id, btn) {
    const panel = document.getElementById(`ea-${id}`);
    const isOpen = btn.dataset.open === '1';
    panel.classList.toggle('hidden', isOpen);
    btn.dataset.open = isOpen ? '0' : '1';
    btn.textContent  = isOpen ? I18n.t('btn_show') : I18n.t('btn_hide');
  },
};

// ═══════════════════════════════════════════════════════════════════════════════
// MODULE: Settings  — open, save, key state, clear all
// ═══════════════════════════════════════════════════════════════════════════════
const Settings = {

  open() {
    UI.$('api-key-input').value = S.apiKey;
    UI.$('api-key-input').type  = 'password';
    const showBtn = UI.$('btn-toggle-key');
    if (showBtn) showBtn.textContent = I18n.t('key_show');
    UI.setPanel('settings');
  },

  save() {
    const k = UI.$('api-key-input').value.trim();
    S.apiKey = k; Store.set(SK.key, k);
    this.refreshKeyState(); UI.toast(I18n.t('toast_settings'));
    if (k) UI.setPanel('analyzer');
  },

  toggleKeyVisibility() {
    const inp = UI.$('api-key-input'), btn = UI.$('btn-toggle-key');
    const showing = inp.type === 'text';
    inp.type = showing ? 'password' : 'text';
    btn.textContent = I18n.t(showing ? 'key_show' : 'key_hide');
  },

  refreshKeyState() {
    const has = !!S.apiKey;
    UI.$('no-key-warning').classList.toggle('hidden', has);
    UI.$('analyzer-input').classList.toggle('hidden', !has);
  },

  clearAll() {
    if (!confirm(I18n.t('confirm_clear_all'))) return;
    S.log = []; Store.setJ(SK.log, S.log);
    S.apiKey = ''; Store.set(SK.key, '');
    UI.$('api-key-input').value = '';
    this.refreshKeyState();
    Render.log();
    UI.toast(I18n.t('toast_cleared_all'));
  },
};

// ═══════════════════════════════════════════════════════════════════════════════
// MODULE: UI  — DOM helpers, toast, panel switching
// ═══════════════════════════════════════════════════════════════════════════════
const UI = {

  $(id) { return document.getElementById(id); },

  toast(msg, ms = 2600) {
    const el = this.$('toast');
    el.textContent = msg;
    el.classList.remove('hidden'); el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => {
      el.classList.remove('show');
      setTimeout(() => el.classList.add('hidden'), 250);
    }, ms);
  },

  setPanel(name) {
    document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
    document.querySelectorAll('.tab-btn').forEach(b => {
      const active = b.dataset.tab === name;
      b.classList.toggle('active', active);
      b.setAttribute('aria-selected', String(active));
    });
    this.$(`panel-${name}`).classList.remove('hidden');
  },
};

// ═══════════════════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════════════════
function fmtDate(iso) {
  const d = new Date(iso), p = n => String(n).padStart(2,'0');
  return `${p(d.getDate())}.${p(d.getMonth()+1)}.${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
function fmtShort(iso) {
  const d = new Date(iso), p = n => String(n).padStart(2,'0');
  return `${p(d.getDate())}.${p(d.getMonth()+1)}.${d.getFullYear()}`;
}

// ═══════════════════════════════════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════════════════════════════════
function setupEvents() {
  // Tab navigation
  document.querySelectorAll('.tab-btn').forEach(b =>
    b.addEventListener('click', () => UI.setPanel(b.dataset.tab)));

  // Language
  UI.$('btn-pl').addEventListener('click', () => I18n.setLang('pl'));
  UI.$('btn-en').addEventListener('click', () => I18n.setLang('en'));

  // Settings — now a tab; gear icon in header opens settings tab
  UI.$('btn-settings').addEventListener('click', () => Settings.open());
  UI.$('btn-save-settings').addEventListener('click', () => Settings.save());
  UI.$('btn-from-warning').addEventListener('click', () => Settings.open());
  UI.$('api-key-input').addEventListener('keydown', e => { if (e.key === 'Enter') Settings.save(); });
  UI.$('btn-toggle-key').addEventListener('click', () => Settings.toggleKeyVisibility());
  UI.$('btn-clear-all').addEventListener('click', () => Settings.clearAll());

  // Analyzer
  UI.$('btn-analyze').addEventListener('click', () => Analyzer.run());
  UI.$('msg-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) Analyzer.run();
  });

  // Log
  UI.$('btn-save-log').addEventListener('click', () => Log.save());
  UI.$('btn-export').addEventListener('click', () => Log.export());
  UI.$('btn-clear').addEventListener('click', () => Log.clear());

  // Log entry actions (delegated)
  UI.$('log-entries').addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const { action, id } = btn.dataset;
    if (action === 'delete') Log.delete(id);
    if (action === 'toggle') Log.toggle(id, btn);
  });
}

// ═══════════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════════
function init() {
  S.lang   = Store.get(SK.lang, 'pl');
  S.apiKey = Store.get(SK.key, '');
  S.log    = Store.getJ(SK.log, []);

  I18n.updateAll();
  Settings.refreshKeyState();
  Render.log();
  setupEvents();
}

init();
</script>
